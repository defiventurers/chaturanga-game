<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arctic Dominion - 4 Player Dice Strategy</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #081a34;
      --bg-1: #0c2b4f;
      --bg-2: #1a2232;
      --surface: rgba(24, 31, 46, 0.9);
      --surface-2: rgba(32, 41, 60, 0.88);
      --surface-3: rgba(14, 18, 28, 0.84);
      --panel-border: rgba(240, 215, 165, 0.16);
      --panel-border-strong: rgba(240, 215, 165, 0.26);
      --text: #f4efe5;
      --text-soft: #d8d2c8;
      --muted: #a59b8b;
      --gold: #dfbf7a;
      --gold-soft: rgba(223, 191, 122, 0.18);
      --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.45);
      --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.34);
      --shadow-sm: 0 6px 16px rgba(0, 0, 0, 0.24);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition-fast: 140ms cubic-bezier(.2,.8,.2,1);
      --transition-med: 220ms cubic-bezier(.2,.8,.2,1);
      --ice-white: #f4fdff;
      --ice-blue: #cdefff;
      --ice-blue-deep: #8fd8ff;
      --ice-cyan-glow: #64e8ff;
      --ice-border: rgba(174, 243, 255, 0.95);
      --snow-bg: #dff6ff;
      --cell-light: #eefbff;
      --cell-light-2: #ddf5ff;
      --cell-dark: #b2e6ff;
      --cell-dark-2: #8ed4ff;
      --selected: #f8d469;
      --selected-ring: rgba(248, 212, 105, 0.72);
      --possible: #4ad78c;
      --possible-ring: rgba(74, 215, 140, 0.72);
      --capture: #ff7b7b;
      --capture-ring: rgba(255, 123, 123, 0.72);
      --last-move: rgba(107, 168, 255, 0.58);
      --focus: #8ec5ff;
      --disabled: #596273;
      --green: #2ba66a;
      --green-2: #75db9e;
      --red: #d85b62;
      --red-2: #ff9ea3;
      --blue: #5890f6;
      --blue-2: #a8c4ff;
      --yellow: #ff60bd;
      --yellow-2: #ffb7e1;
      --team-green-bg: linear-gradient(180deg, rgba(43,166,106,0.22), rgba(16,57,39,0.92));
      --team-red-bg: linear-gradient(180deg, rgba(216,91,98,0.22), rgba(73,27,31,0.92));
      --team-blue-bg: linear-gradient(180deg, rgba(88,144,246,0.22), rgba(26,43,77,0.92));
      --team-yellow-bg: linear-gradient(180deg, rgba(255,96,189,0.28), rgba(109,20,70,0.92));
      --glow-cyan: #73e7ff;
      --piece-layer-offset-x: 0px;
      --piece-layer-offset-y: 0px;
      --piece-size: 86%;
      --actions-offset-x: 0px;
      --actions-offset-y: 0px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(60,190,255,0.35), transparent 35%),
        radial-gradient(circle at 50% 100%, rgba(60,190,255,0.25), transparent 45%),
        linear-gradient(180deg, #071a3d 0%, #0b3e72 45%, #0e6fa2 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.24;
      background:
        radial-gradient(circle at 14% 16%, rgba(255,255,255,0.18) 0 1px, transparent 1.6px),
        radial-gradient(circle at 78% 24%, rgba(191,235,255,0.16) 0 1px, transparent 1.6px),
        radial-gradient(circle at 26% 68%, rgba(224,248,255,0.14) 0 1px, transparent 1.6px),
        radial-gradient(circle at 68% 78%, rgba(162,223,255,0.12) 0 1px, transparent 1.7px);
      background-size: 170px 170px, 210px 210px, 240px 240px, 280px 280px;
      mask-image: radial-gradient(circle at center, black, transparent 94%);
    }

    button, input, select, textarea { font: inherit; }

    button:focus-visible,
    .cell:focus-visible,
    .pill:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    h1, h2, h3, h4, p { margin: 0; }

    .hidden { display: none !important; }

    .app-view {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .screen {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .screen.active {
      display: flex;
    }

    .screen-panel {
      width: min(980px, 100%);
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        rgba(16, 22, 34, 0.94);
      box-shadow: var(--shadow-lg);
      padding: 28px;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .screen-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(223,191,122,0.12), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,0.05), transparent 35%);
      pointer-events: none;
    }

    .screen-panel > * { position: relative; z-index: 1; }

    .hero {
      display: grid;
      gap: 18px;
      text-align: center;
      place-items: center;
      padding: 36px 18px;
    }

    .logo-mark {
      width: 92px;
      height: 92px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 2rem;
      color: var(--gold);
      border: 1px solid rgba(223,191,122,0.28);
      background:
        radial-gradient(circle at top, rgba(223,191,122,0.18), transparent 55%),
        rgba(255,255,255,0.03);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.02), var(--shadow-sm);
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .hero p {
      max-width: 720px;
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.6;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: var(--gold);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 10px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .menu-card,
    .config-card,
    .tutorial-card,
    .loading-card {
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      padding: 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .menu-actions,
    .stack {
      display: grid;
      gap: 12px;
    }

    .summary-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .summary-item strong {
      color: var(--text);
      font-weight: 800;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .choice-card {
      display: grid;
      gap: 10px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: transform var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast), box-shadow var(--transition-fast);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      text-align: left;
    }

    .choice-card:hover {
      transform: translateY(-2px);
      border-color: rgba(223,191,122,0.22);
      background: rgba(255,255,255,0.045);
    }

    .choice-card.selected {
      border-color: rgba(142,197,255,0.38);
      box-shadow: 0 0 0 2px rgba(142,197,255,0.16), inset 0 1px 0 rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(88,144,246,0.12), rgba(255,255,255,0.04));
    }

    .choice-card h3 {
      font-size: 1.08rem;
      margin: 0;
    }

    .choice-card p {
      color: var(--text-soft);
      font-size: 0.85rem;
      line-height: 1.35;
    }

    .choice-meta {
      color: var(--gold);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .screen-actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .tutorial-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .tutorial-step {
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      display: grid;
      gap: 6px;
    }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .step-num {
      color: var(--gold);
      font-weight: 800;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tutorial-step h4 {
      font-size: 0.98rem;
      margin-top: 2px;
    }

    .step-icon {
      font-size: 1.2rem;
      line-height: 1;
      border-radius: 999px;
      padding: 6px;
      background: rgba(142,197,255,0.13);
      border: 1px solid rgba(142,197,255,0.34);
    }

    .tutorial-step p {
      color: var(--text-soft);
      line-height: 1.4;
      font-size: 0.85rem;
    }

    .step-bullets {
      margin: 0;
      padding-left: 16px;
      color: var(--text-soft);
      font-size: 0.8rem;
      line-height: 1.35;
      display: grid;
      gap: 2px;
    }

    .mini-visual {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .mini-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(255,255,255,0.03);
      font-size: 0.74rem;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .piece-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      border: 1px solid rgba(223,191,122,0.3);
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .more-details {
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .more-details summary {
      cursor: pointer;
      padding: 10px 12px;
      list-style: none;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .more-details summary::-webkit-details-marker { display: none; }

    .more-details-body {
      padding: 2px 12px 12px;
    }

    .tutorial-flow-head { display:grid; gap: 6px; margin-bottom: 6px; }
    .tutorial-flow-title { font-size: clamp(1.75rem, 5vw, 2.2rem); line-height: 1.05; }
    .tutorial-flow-subtitle { color: var(--text-soft); font-size: .94rem; }
    .tutorial-helper { color: var(--ice-blue); font-size: .8rem; letter-spacing: .04em; }
    .team-card-row, .piece-card-row { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
    .tutorial-choice-card { border-radius: 16px; border:1px solid rgba(174,243,255,.26); background: rgba(255,255,255,.04); min-height: 72px; display:flex; align-items:center; gap:10px; padding:10px; }
    .tutorial-choice-card img { width: 42px; height: 42px; object-fit: contain; border-radius: 10px; background: rgba(0,0,0,.14); padding: 4px; }
    .tutorial-choice-card .meta { display:grid; gap:2px; text-align:left; }
    .tutorial-choice-card .meta strong { font-size:.9rem; }
    .tutorial-choice-card .meta span { color: var(--text-soft); font-size:.75rem; }
    .tutorial-choice-card.team-red { background: linear-gradient(180deg, rgba(216,91,98,.22), rgba(73,27,31,.72)); }
    .tutorial-choice-card.team-blue { background: linear-gradient(180deg, rgba(88,144,246,.22), rgba(26,43,77,.72)); }
    .tutorial-choice-card.team-green { background: linear-gradient(180deg, rgba(43,166,106,.22), rgba(16,57,39,.72)); }
    .tutorial-choice-card.team-yellow { background: linear-gradient(180deg, rgba(255,96,189,.26), rgba(109,20,70,.72)); }
    .piece-explorer {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(174, 243, 255, 0.32);
      background: rgba(8, 28, 50, 0.56);
      display: grid;
      gap: 10px;
    }
    .explorer-row { display: grid; gap: 8px; }
    .explorer-label { font-size: 0.78rem; color: var(--ice-blue); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .explorer-chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .explorer-chip { width: auto; padding: 8px 10px; border-radius: 999px; font-size: .8rem; }
    .explorer-chip.selected { border-color: var(--ice-border); box-shadow: 0 0 0 2px rgba(100,232,255,.2); }
    .tutorial-board-wrap { position: relative; width: min(100%, 360px); margin: 0 auto; border-radius: 14px; overflow: hidden; border: 1px solid rgba(174, 243, 255, 0.36); }
    .tutorial-board { display: grid; grid-template-columns: repeat(8,1fr); }
    .tutorial-cell { aspect-ratio: 1 / 1; border: 1px solid rgba(200,241,255,0.35); padding: 0; position: relative; }
    .tutorial-cell.light { background: linear-gradient(160deg, var(--cell-light), var(--cell-light-2)); }
    .tutorial-cell.dark { background: linear-gradient(150deg, var(--cell-dark), var(--cell-dark-2)); }
    .tutorial-cell.selected::after,.tutorial-cell.possible::after,.tutorial-cell.capture::after { content:""; position:absolute; inset:3px; border-radius:8px; }
    .tutorial-cell.selected::after { box-shadow: inset 0 0 0 2px var(--selected), 0 0 10px rgba(248,212,105,.45); }
    .tutorial-cell.possible::after { box-shadow: inset 0 0 0 2px #59b7ff, 0 0 10px rgba(89,183,255,.4); }
    .tutorial-cell.capture::after { box-shadow: inset 0 0 0 2px #ff884f, 0 0 10px rgba(255,136,79,.42); }
    .tutorial-arrows { position:absolute; inset:0; pointer-events:none; }
    .tutorial-arrow { stroke: rgba(115,231,255,.88); stroke-width: 3; fill: none; stroke-linecap: round; stroke-dasharray: 6 8; animation: arrowFlow 1.5s linear infinite; }
    @keyframes arrowFlow { to { stroke-dashoffset: -28; opacity: .72; } }
    .explorer-desc { padding: 10px; border-radius: 12px; border:1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); font-size:.84rem; color: var(--text-soft); display:grid; gap:4px; }
    .explorer-controls { display:flex; flex-wrap:wrap; gap:6px; }
    .explorer-controls button { width: auto; padding: 8px 10px; font-size: .78rem; }

    .loading-wrap {
      display: grid;
      place-items: center;
      gap: 18px;
      padding: 48px 20px;
      text-align: center;
    }

    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--gold);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .splash-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background-image: url("assets/arctic/splash/arctic-dominion-splash.webp");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      cursor: pointer;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }

    #screenSplash {
      padding: 0;
    }

    .hero,
    .logo-mark,
    .splash-prompt {
      display: none !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    button {
      position: relative;
      overflow: hidden;
      width: 100%;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 0.96rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      color: #fbfbfe;
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), filter var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast);
      box-shadow: var(--shadow-sm);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border-color: rgba(255,255,255,0.1);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    button:active:not(:disabled) {
      transform: translateY(1px) scale(0.99);
    }

    button.primary {
      background: linear-gradient(180deg, #3f8cff, #2259c7);
      border-color: rgba(169, 205, 255, 0.24);
    }

    button.secondary {
      background: linear-gradient(180deg, #45516a, #293245);
      border-color: rgba(200, 214, 241, 0.14);
    }

    button.warn {
      background: linear-gradient(180deg, #b65339, #7f2f1f);
      border-color: rgba(255, 188, 162, 0.18);
    }

    button.subtle {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border-color: rgba(255,255,255,0.1);
    }

    button.ghost {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.08);
    }

    button:disabled {
      background: linear-gradient(180deg, rgba(89, 98, 115, 0.8), rgba(63, 70, 83, 0.8));
      border-color: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.58);
      cursor: not-allowed;
      box-shadow: none;
    }

    .app-shell {
      width: min(1520px, calc(100vw - 32px));
      margin: 16px auto;
      padding: 14px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
    }

    .game-topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 8px 18px;
    }

    .game-topbar h2 {
      font-size: 1.15rem;
      margin: 0;
    }

    .game-topbar p {
      color: var(--text-soft);
      font-size: 0.88rem;
      line-height: 1.45;
      margin-top: 6px;
    }

    .game-top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .game-top-actions button {
      width: auto;
      min-width: 150px;
    }

    .config-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .config-pill {
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 700;
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(600px, 1fr) 340px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)),
        var(--surface);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 18px;
      backdrop-filter: blur(16px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 35%),
        radial-gradient(circle at top right, rgba(223, 191, 122
