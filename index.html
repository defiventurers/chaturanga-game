<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Arctic Dominion - Rebuild</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #061b3a;
      --panel: rgba(4, 22, 46, 0.84);
      --panel-2: rgba(8, 44, 86, 0.76);
      --ice: #cdefff;
      --text: #f4fdff;
      --muted: rgba(230, 248, 255, 0.76);
      --gold: #f7d56b;
      --green: #75db9e;
      --red: #ff9ea3;
      --blue: #a8c4ff;
      --yellow: #ffb7e1;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      touch-action: manipulation;
    }

    button { font: inherit; }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-start;
      justify-content: center;
      background: var(--bg);
      overflow: hidden;
    }

    .screen.active { display: flex; }

    .screen-shell,
    .menu-screen-shell {
      position: fixed;
      inset: 0;
      width: 100vw;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: hidden;
      background: var(--bg);
    }

    .screen-stage {
      position: relative;
      width: min(100vw, calc(100dvh * 9 / 16));
      height: min(100dvh, calc(100vw * 16 / 9));
      aspect-ratio: 9 / 16;
      margin-inline: auto;
      overflow: hidden;
      background: #061b3a;
    }

    .screen-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      object-position: center center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .hitbox-layer,
    .game-hitbox-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    .hitbox,
    .game-hitbox {
      position: absolute;
      z-index: 100;
      pointer-events: auto;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .debug-hitboxes .hitbox,
    .debug-hitboxes .game-hitbox {
      background: rgba(255, 0, 0, 0.24);
      border: 2px solid rgba(255, 230, 0, 0.9);
    }

    .mode-toast {
      position: absolute;
      left: 50%;
      bottom: 15%;
      transform: translateX(-50%);
      z-index: 120;
      opacity: 0;
      pointer-events: none;
      background: rgba(6, 27, 58, 0.94);
      color: #e9f4ff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.85rem;
      transition: opacity 160ms ease;
      white-space: nowrap;
    }
    .mode-toast.show { opacity: 1; }

    .selected-player-outline,
    .team-selected-outline {
      position: absolute;
      z-index: 20;
      pointer-events: none;
      display: none;
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 12px rgba(255,255,255,.8), 0 0 22px rgba(0,220,255,.9), inset 0 0 10px rgba(255,255,255,.35);
      border-radius: 18px;
      background: transparent !important;
    }
    .selected-player-outline.active,
    .team-selected-outline.active { display: block; }

    .selected-player-outline { border-radius: 24px; border-width: 3px; }

    .plain-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 18%, rgba(70, 220, 255, .32), transparent 34%),
        linear-gradient(180deg, #061b3a 0%, #0c477a 52%, #08213f 100%);
    }

    .plain-card {
      width: min(92vw, 440px);
      border-radius: 28px;
      border: 1px solid rgba(190,245,255,.42);
      background: linear-gradient(180deg, rgba(230,250,255,.13), rgba(6,22,46,.82));
      box-shadow: 0 22px 50px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.18);
      padding: 22px;
      display: grid;
      gap: 14px;
      backdrop-filter: blur(16px);
    }

    .plain-card h1 {
      margin: 0;
      font-size: clamp(1.7rem, 6vw, 2.4rem);
      line-height: 1.05;
      letter-spacing: .02em;
    }

    .plain-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: .95rem;
    }

    .screen-note {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(247,213,107,.12);
      border: 1px solid rgba(247,213,107,.28);
      color: #fff3c7;
      font-size: .82rem;
      line-height: 1.35;
    }

    .button-stack { display: grid; gap: 10px; }

    .ui-btn {
      min-height: 50px;
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(190,245,255,.52);
      color: white;
      background: linear-gradient(180deg, rgba(56,217,255,.95), rgba(8,120,216,.95));
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      box-shadow: 0 10px 22px rgba(6,79,158,.32), inset 0 1px 0 rgba(255,255,255,.5);
      cursor: pointer;
    }

    .ui-btn.secondary {
      background: linear-gradient(180deg, rgba(155,220,255,.22), rgba(18,58,100,.52));
    }

    .ui-btn.ghost {
      background: rgba(255,255,255,.05);
      box-shadow: none;
    }

    .room-code-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .room-code-box input {
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(190,245,255,.42);
      background: rgba(0,0,0,.22);
      color: white;
      padding: 0 12px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: .08em;
      outline: none;
    }

    .lobby-list {
      display: grid;
      gap: 8px;
    }

    .lobby-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(190,245,255,.18);
      color: var(--muted);
      font-size: .88rem;
    }

    .lobby-row strong { color: white; }
    .ready { color: #75db9e; font-weight: 900; }
    .waiting { color: #f7d56b; font-weight: 900; }


    .room-ready-stage {
      background: #061b3a;
    }

    .room-ready-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      font-family: Georgia, "Times New Roman", serif;
      text-transform: uppercase;
    }

    .room-info-text {
      position: absolute;
      left: 18.81%;
      top: 25.58%;
      width: 61.44%;
      height: 3.77%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 2.5%;
      color: #f5fdff;
      font-size: clamp(10px, 2.25vw, 18px);
      font-weight: 900;
      letter-spacing: .035em;
      text-shadow:
        0 2px 2px rgba(0, 10, 40, .9),
        0 0 8px rgba(90, 220, 255, .8),
        0 0 14px rgba(255, 255, 255, .36);
    }

    .lobby-status-text {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(11px, 2.55vw, 20px);
      font-weight: 900;
      letter-spacing: .045em;
      color: #eaffff;
      text-shadow:
        0 2px 2px rgba(0, 10, 40, .95),
        0 0 7px rgba(90, 220, 255, .62);
    }

    .lobby-status-red { left: 61.48%; top: 33.48%; width: 24.52%; height: 5.06%; }
    .lobby-status-green { left: 61.29%; top: 42.90%; width: 24.34%; height: 4.64%; }
    .lobby-status-blue { left: 62.04%; top: 52.65%; width: 23.59%; height: 4.42%; }
    .lobby-status-yellow { left: 62.04%; top: 61.53%; width: 23.40%; height: 4.63%; }

    .lobby-status-text.status-ready {
      color: #8dffb0;
      text-shadow:
        0 2px 2px rgba(0, 30, 20, .95),
        0 0 8px rgba(90, 255, 155, .82),
        0 0 14px rgba(255, 255, 255, .28);
    }

    .lobby-status-text.status-waiting {
      color: #ffe08a;
      text-shadow:
        0 2px 2px rgba(45, 25, 0, .95),
        0 0 8px rgba(255, 215, 90, .75),
        0 0 12px rgba(255, 255, 255, .22);
    }

    .lobby-status-text.status-bot {
      color: #7ee8ff;
      text-shadow:
        0 2px 2px rgba(0, 20, 55, .95),
        0 0 8px rgba(100, 230, 255, .82);
    }

    .lobby-status-text.status-human {
      color: #f5fdff;
      text-shadow:
        0 2px 2px rgba(0, 10, 40, .95),
        0 0 8px rgba(120, 230, 255, .62);
    }

    .ready-lobby-status-text {
      position: absolute;
      left: 11.81%;
      top: 84.49%;
      width: 74.51%;
      height: 5.95%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 2%;
      color: #ffe08a;
      font-size: clamp(12px, 2.75vw, 22px);
      font-weight: 900;
      letter-spacing: .055em;
      text-shadow:
        0 2px 2px rgba(0, 10, 40, .95),
        0 0 8px rgba(90, 220, 255, .72),
        0 0 14px rgba(255, 255, 255, .28);
    }

    .ready-lobby-status-text.status-ready {
      color: #8dffb0;
      text-shadow:
        0 2px 2px rgba(0, 30, 20, .95),
        0 0 10px rgba(90, 255, 155, .86),
        0 0 16px rgba(255, 255, 255, .28);
    }

    .ready-lobby-status-text.status-countdown {
      color: #ffffff;
      text-shadow:
        0 2px 2px rgba(0, 10, 40, .95),
        0 0 10px rgba(100, 230, 255, .95),
        0 0 18px rgba(255, 255, 255, .42);
    }

    #screenGame {
      background: #c9f3ff;
      align-items: flex-start;
      justify-content: center;
    }

    .game-stage {
      position: relative;
      width: min(100vw, 520px);
      max-width: 100vw;
      aspect-ratio: 9 / 16;
      margin-inline: auto;
      overflow: hidden;
      isolation: isolate;
      flex: 0 0 auto;
      background-image: url("/assets/screens/arctic-dominion-game-base.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      --status-left: 14.5%;
      --status-top: 24.95%;
      --status-width: 71%;
      --status-height: 4.25%;
      --board-left: 18.81%;
      --board-top: 33.50%;
      --board-size: 66.84%;
      --piece-size: 84%;
      --dice-left: 24.80%;
      --dice-top: 70.71%;
      --dice-width: 50.04%;
      --dice-height: 18.58%;
      --dice-gap: 6.5%;
      --dice-piece-size: 62%;
      --active-player-color: #75db9e;
    }

    .game-overlay { position: absolute; inset: 0; pointer-events: none; }

    .status-overlay {
      position: absolute;
      left: var(--status-left);
      top: var(--status-top);
      width: var(--status-width);
      height: var(--status-height);
      z-index: 40;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5.5%;
    }

    .status-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      line-height: 1;
    }

    .status-turn {
      font-size: clamp(9px, 1.75vw, 13px);
      font-weight: 900;
      color: var(--active-player-color);
    }

    .status-main {
      font-size: clamp(9px, 1.75vw, 13px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,15,40,.75);
      white-space: nowrap;
    }

    .status-badge {
      font-size: clamp(6px, 1.25vw, 9px);
      font-weight: 900;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(7,55,102,.72);
      border: 1px solid rgba(189,239,255,.85);
      color: #fff;
    }

    .board-overlay {
      position: absolute;
      left: var(--board-left);
      top: var(--board-top);
      width: var(--board-size);
      aspect-ratio: 1 / 1;
      z-index: 5;
      pointer-events: auto;
    }

    .board-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      pointer-events: auto;
      gap: 0;
      border: 0;
      background: transparent !important;
    }

    .cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      margin: 0 !important;
      overflow: visible;
      color: transparent;
      font-size: 0;
      cursor: pointer;
    }

    .cell.selected img,
    .cell.selected .piece {
      filter: drop-shadow(0 0 7px rgba(255, 220, 70, 1)) drop-shadow(0 4px 5px rgba(0, 20, 60, .52));
    }

    .cell.legal::after {
      content: "";
      position: absolute;
      width: 28%;
      height: 28%;
      left: 36%;
      top: 36%;
      border-radius: 999px;
      background: rgba(255,230,90,.86);
      box-shadow: 0 0 8px rgba(255,230,90,.95), 0 0 14px rgba(56,217,255,.55);
      pointer-events: none;
    }

    .cell.capture::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 14%;
      border: 3px solid rgba(255,130,130,.88);
      box-shadow: 0 0 10px rgba(255,90,90,.85), 0 0 18px rgba(56,217,255,.45);
      pointer-events: none;
    }

    .piece {
      width: var(--piece-size);
      height: var(--piece-size);
      max-width: var(--piece-size);
      max-height: var(--piece-size);
      margin: auto;
      object-fit: contain;
      display: block;
      pointer-events: none;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      filter: drop-shadow(0 3px 5px rgba(6,55,102,.35));
    }

    .piece-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
      background: transparent !important;
    }

    .piece-fallback {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      font-weight: 900;
      font-size: clamp(14px, 2vw, 22px);
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,.7);
    }

    .dice-overlay {
      position: absolute;
      left: var(--dice-left);
      top: var(--dice-top);
      width: var(--dice-width);
      height: var(--dice-height);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--dice-gap);
      align-items: center;
      justify-items: center;
      z-index: 8;
      pointer-events: auto;
    }

    .dice-slot {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      background: transparent !important;
      border: 0 !important;
      padding: 0 !important;
    }

    .die-piece {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #eaf7ff;
      font-size: clamp(10px, 2.4vw, 15px);
      font-weight: 900;
      text-align: center;
      line-height: 1.05;
      text-shadow: 0 1px 2px rgba(0,30,80,.8), 0 0 6px rgba(255,255,255,.25);
      text-transform: uppercase;
    }

    .die-piece img {
      display: block;
      width: var(--dice-piece-size);
      height: var(--dice-piece-size);
      object-fit: contain;
      margin: 0 auto;
      background: transparent !important;
      filter: drop-shadow(0 3px 4px rgba(0,20,60,.35));
    }


    /* HOW TO PLAY - interactive rules trainer */
    .how-play-stage {
      padding: 18px;
      overflow-y: auto;
      background:
        radial-gradient(circle at 50% 0%, rgba(105, 230, 255, .28), transparent 34%),
        linear-gradient(180deg, #061b3a 0%, #08294f 48%, #020d1d 100%);
    }

    .how-play-panel {
      width: min(92vw, 560px);
      min-height: calc(100dvh - 36px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .how-play-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
    }

    .how-play-title {
      margin: 0;
      flex: 1;
      text-align: center;
      font-size: clamp(1.25rem, 5vw, 2rem);
      font-weight: 1000;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,.45), 0 0 18px rgba(75,220,255,.45);
    }

    .how-play-btn-small,
    .how-play-btn-main,
    .how-play-team-card,
    .how-play-piece-card {
      border: 1px solid rgba(190,245,255,.44);
      color: white;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.18);
    }

    .how-play-btn-small {
      min-width: 72px;
      min-height: 38px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      font-size: .82rem;
      font-weight: 900;
    }

    .how-play-card {
      border-radius: 24px;
      border: 1px solid rgba(190,245,255,.32);
      background: linear-gradient(180deg, rgba(255,255,255,.13), rgba(5,25,52,.78));
      padding: 16px;
      box-shadow: 0 18px 42px rgba(0,0,0,.32);
    }

    .how-play-card h2,
    .how-play-card h3 {
      margin: 0 0 6px;
      text-align: center;
      font-size: clamp(1.25rem, 5vw, 1.8rem);
    }

    .how-play-sub {
      margin: 0 0 16px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
      font-size: .94rem;
    }

    .how-play-team-grid,
    .how-play-piece-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .how-play-team-card,
    .how-play-piece-card {
      min-height: 86px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(56,217,255,.18), rgba(5,25,52,.62));
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: .045em;
    }

    .how-play-team-card[data-team="polly"] { border-color: rgba(255,183,225,.7); }
    .how-play-team-card[data-team="retsba"] { border-color: rgba(255,158,163,.7); }
    .how-play-team-card[data-team="pengu"] { border-color: rgba(168,196,255,.7); }
    .how-play-team-card[data-team="abster"] { border-color: rgba(117,219,158,.7); }

    .how-play-piece-card {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 10px;
      min-height: 112px;
    }

    .how-play-piece-card:first-child {
      border-color: rgba(125, 232, 255, .95);
      box-shadow: 0 0 18px rgba(75,220,255,.5), inset 0 1px 0 rgba(255,255,255,.18);
    }

    .how-play-piece-thumb {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
    }

    .how-play-piece-thumb img,
    .how-play-board-piece img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,.35));
    }

    .how-play-piece-fallback {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,.12);
      font-size: 1.45rem;
      font-weight: 1000;
    }

    .how-play-demo-grid {
      display: grid;
      gap: 14px;
    }

    .how-play-piece-name {
      margin: 0;
      font-size: clamp(1.45rem, 6vw, 2.1rem);
      font-weight: 1000;
      text-align: center;
      text-transform: uppercase;
    }

    .how-play-role {
      margin: 0;
      color: #d8f7ff;
      text-align: cente
